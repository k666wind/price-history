<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0f;
      --surface: #13131a;
      --surface2:#1c1c28;
      --border:  rgba(255,255,255,0.07);
      --accent:  #7c6af7;
      --accent2: #f76a8a;
      --text:    #f0f0f8;
      --muted:   rgba(240,240,248,0.4);
      --success: #4ade80;
      --danger:  #f87171;
      --warn:    #fbbf24;
    }

    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

    body::before {
      content: ''; position: fixed; top: -20vh; left: 50%; transform: translateX(-50%);
      width: 80vw; height: 50vh;
      background: radial-gradient(ellipse, rgba(124,106,247,0.1) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .shell { position: relative; z-index: 1; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border); border-radius: 40px;
      padding: 12px 22px; font-size: 0.88rem; font-weight: 500; color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; z-index: 9999; white-space: nowrap;
    }
    .toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(74,222,128,0.4);  color: var(--success); }
    .toast.error   { border-color: rgba(248,113,113,0.4); color: var(--danger); }
    .toast.warn    { border-color: rgba(251,191,36,0.4);  color: var(--warn); }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 20px 18px 0; max-width: 560px; margin: 0 auto;
    }

    .back-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; flex-shrink: 0; transition: border-color 0.15s;
    }
    .back-btn:hover { border-color: var(--accent); }

    .topbar-info { flex: 1; }
    .topbar-title { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .topbar-currency { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    /* ── Main ── */
    .main { padding: 20px 18px 56px; max-width: 560px; margin: 0 auto; }

    /* ── Form card ── */
    .form-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 22px; padding: 20px 18px; margin-bottom: 20px;
    }

    .form-title {
      font-family: 'Syne', sans-serif; font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .field-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .field-label { font-size: 0.7rem; color: var(--muted); font-weight: 500; padding-left: 2px; }

    .field-input {
      width: 100%; height: 48px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 13px;
      padding: 0 16px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      outline: none; transition: border-color 0.15s;
    }
    .field-input::placeholder { color: var(--muted); }
    .field-input:focus { border-color: var(--accent); }

    /* Price hint */
    .price-hint {
      display: none; align-items: center; gap: 8px;
      background: var(--surface2); border-radius: 10px;
      padding: 10px 14px; margin-bottom: 10px;
      font-size: 0.82rem; color: var(--muted); border: 1px solid var(--border);
    }
    .price-hint.visible  { display: flex; }
    .price-hint.cheaper  { border-color: rgba(74,222,128,0.3); color: var(--success); }
    .price-hint.dearer   { border-color: rgba(248,113,113,0.3); color: var(--danger); }
    .price-hint.same     { border-color: rgba(124,106,247,0.3); color: #a99ff8; }

    .btn-add {
      width: 100%; height: 50px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #9b8df8);
      border: none; color: #fff;
      font-family: 'Syne', sans-serif; font-size: 0.92rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.03em;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn-add:hover:not(:disabled) { opacity: 0.87; }
    .btn-add:active:not(:disabled) { transform: scale(0.98); }
    .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Search ── */
    .search-row { display: flex; gap: 10px; margin-bottom: 16px; }

    .search-wrap { position: relative; flex: 1; }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 1rem; pointer-events: none;
    }
    .search-input {
      width: 100%; height: 46px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 0 16px 0 40px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
      outline: none; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    .store-filter {
      height: 46px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 0 14px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
      outline: none; cursor: pointer; min-width: 120px;
    }
    .store-filter:focus { border-color: var(--accent); }
    .store-filter option { background: var(--surface2); }

    /* ── Dashboard ── */
    #dashboard { display: flex; flex-direction: column; gap: 18px; }

    .prod-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 22px; overflow: hidden; animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .prod-header {
      padding: 16px 18px 14px; border-bottom: 1px solid var(--border);
    }
    .prod-name { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
    .prod-badges { display: flex; gap: 7px; margin-top: 8px; flex-wrap: wrap; }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 500;
    }
    .badge-latest { background: rgba(124,106,247,0.18); color: #a99ff8; }
    .badge-lowest { background: rgba(74,222,128,0.15);  color: var(--success); }
    .badge-up     { background: rgba(248,113,113,0.15); color: var(--danger); }
    .badge-down   { background: rgba(74,222,128,0.15);  color: var(--success); }
    .badge-stable { background: rgba(255,255,255,0.07); color: var(--muted); }

    /* Entries */
    .entries { padding: 0 18px 12px; }
    .entries-label {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted); padding: 14px 0 10px;
    }

    .entry-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 11px; transition: background 0.12s;
      border-bottom: 1px solid var(--border);
    }
    .entry-row:last-child { border-bottom: none; }
    .entry-row:hover { background: rgba(255,255,255,0.03); }

    .entry-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--muted); }
    .entry-dot.lowest { background: var(--success); box-shadow: 0 0 6px rgba(74,222,128,0.5); }

    .entry-store { font-size: 0.86rem; font-weight: 500; flex: 1; }
    .entry-price { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; }
    .entry-date  { font-size: 0.7rem; color: var(--muted); }

    .entry-del {
      background: none; border: none; color: var(--danger); cursor: pointer;
      font-size: 0.8rem; padding: 4px 8px; border-radius: 8px;
      opacity: 0.3; transition: opacity 0.15s, background 0.15s; flex-shrink: 0;
    }
    .entry-del:hover { opacity: 1; background: rgba(248,113,113,0.12); }

    /* Charts */
    .charts { padding: 0 18px 18px; display: flex; flex-direction: column; gap: 14px; }

    /* CSV row */
    .csv-row { display: flex; gap: 10px; margin-top: 24px; }
    .btn-csv {
      flex: 1; height: 46px; border-radius: 13px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.86rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: border-color 0.15s, background 0.15s;
    }
    .btn-csv:hover { border-color: var(--accent); background: rgba(124,106,247,0.07); }
    #importCSV { display: none; }

    /* Empty */
    .empty { text-align: center; padding: 44px 24px; color: var(--muted); }
    .empty-icon { font-size: 2.4rem; margin-bottom: 12px; }
    .empty-text { font-size: 0.88rem; }

    .spinner {
      display: flex; align-items: center; justify-content: center;
      padding: 60px; color: var(--muted); font-size: 0.9rem; gap: 10px;
    }
    .spin {
      width: 18px; height: 18px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="shell">
  <div class="toast" id="toast"></div>

  <div id="loadingGate" class="spinner"><div class="spin"></div> Loading…</div>

  <div id="trackerApp" style="display:none">
    <div class="topbar">
      <a href="index.html" class="back-btn">‹</a>
      <div class="topbar-info">
        <div class="topbar-title">
          <span id="catEmoji"></span>
          <span id="catName"></span>
        </div>
        <div class="topbar-currency" id="currencyLabel"></div>
      </div>
    </div>

    <div class="main">
      <div class="form-card">
        <div class="form-title">Add Price Record</div>
        <div class="field-group">
          <div class="field-label">Product</div>
          <input class="field-input" id="product" placeholder="e.g. Whole Milk 2L" autocomplete="off">
        </div>
        <div class="two-col">
          <div class="field-group">
            <div class="field-label">Price (<span class="cur-sym"></span>)</div>
            <input class="field-input" id="price" type="number" placeholder="0.00" min="0.01" step="0.01">
          </div>
          <div class="field-group">
            <div class="field-label">Store</div>
            <input class="field-input" id="store" placeholder="e.g. Tesco" autocomplete="off">
          </div>
        </div>
        <div class="price-hint" id="priceHint"></div>
        <button class="btn-add" id="addBtn">Add Record</button>
      </div>

      <div class="search-row">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input class="search-input" id="search" placeholder="Search products…">
        </div>
        <select class="store-filter" id="filterStore">
          <option value="">All stores</option>
        </select>
      </div>

      <div id="dashboard"></div>

      <div class="csv-row">
        <button class="btn-csv">
          <label for="importCSV" style="cursor:pointer;display:flex;align-items:center;gap:6px">
            ⬆ Import CSV
            <input type="file" id="importCSV" accept=".csv">
          </label>
        </button>
        <button class="btn-csv" id="exportBtn">⬇ Export CSV</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { auth, db } from './firebase.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import {
    collection, addDoc, getDocs, deleteDoc, doc, query, orderBy
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // ── URL params ──
  const params   = new URLSearchParams(location.search);
  const catId    = params.get('id')       || 'general';
  const catName  = params.get('name')     || 'Tracker';
  const catEmoji = params.get('emoji')    || '🏷️';
  const currency = params.get('currency') || localStorage.getItem('ph_currency') || '£';

  document.getElementById('catName').textContent    = catName;
  document.getElementById('catEmoji').textContent   = catEmoji;
  document.getElementById('currencyLabel').textContent = `Currency: ${currency}`;
  document.title = `${catName} · Price History`;
  document.querySelectorAll('.cur-sym').forEach(el => el.textContent = currency);

  // ── Toast ──
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.className = 'toast', 2800);
  }

  let currentUser = null;
  let cachedRecords = null;
  let charts = {};

  function col() {
    return collection(db, `users/${currentUser.uid}/records_${catId}`);
  }

  // ── Fetch ──
  async function fetchRecords(force = false) {
    if (!force && cachedRecords) return cachedRecords;
    const snap = await getDocs(query(col(), orderBy('date', 'asc')));
    cachedRecords = [];
    snap.forEach(d => cachedRecords.push({ _id: d.id, ...d.data() }));
    return cachedRecords;
  }

  // ── Trend badge ──
  function trendBadge(recs) {
    if (recs.length < 2) return '';
    const latest = recs[recs.length - 1].price;
    const prev   = recs[recs.length - 2].price;
    const pct    = (Math.abs((latest - prev) / prev) * 100).toFixed(1);
    if (latest < prev) return `<span class="badge badge-down">📉 ${pct}% cheaper</span>`;
    if (latest > prev) return `<span class="badge badge-up">📈 ${pct}% dearer</span>`;
    return `<span class="badge badge-stable">➡ Stable</span>`;
  }

  // ── Price hint ──
  function updatePriceHint() {
    const productKey = document.getElementById('product').value.trim().toLowerCase();
    const priceVal   = parseFloat(document.getElementById('price').value);
    const hint       = document.getElementById('priceHint');
    if (!productKey || !cachedRecords || isNaN(priceVal)) {
      hint.className = 'price-hint'; return;
    }
    const prodRecs = cachedRecords.filter(r => r.product === productKey);
    if (!prodRecs.length) { hint.className = 'price-hint'; return; }
    const last = [...prodRecs].sort((a,b) => new Date(b.date) - new Date(a.date))[0];
    const diff = priceVal - last.price;
    const pct  = (Math.abs(diff) / last.price * 100).toFixed(1);
    if (diff < 0) {
      hint.className = 'price-hint visible cheaper';
      hint.textContent = `✓ ${pct}% cheaper than last time (${currency}${last.price.toFixed(2)})`;
    } else if (diff > 0) {
      hint.className = 'price-hint visible dearer';
      hint.textContent = `↑ ${pct}% more expensive than last time (${currency}${last.price.toFixed(2)})`;
    } else {
      hint.className = 'price-hint visible same';
      hint.textContent = `= Same price as last time`;
    }
  }

  document.getElementById('product').addEventListener('input', updatePriceHint);
  document.getElementById('price').addEventListener('input', updatePriceHint);

  // ── Render dashboard ──
  function renderDashboard(records) {
    const dash = document.getElementById('dashboard');
    dash.innerHTML = '';
    if (!records.length) {
      dash.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No records yet. Add one above!</div></div>`;
      return;
    }

    const productMap = {};
    records.forEach(r => {
      if (!productMap[r.product]) productMap[r.product] = [];
      productMap[r.product].push(r);
    });

    let idx = 0;
    for (let prod in productMap) {
      const recs   = productMap[prod].sort((a,b) => new Date(b.date) - new Date(a.date));
      const recsAsc = [...recs].reverse();
      const latest = recs[0];
      const lowest = recs.reduce((m,r) => r.price < m.price ? r : m, recs[0]);

      const storeStats = {};
      recs.forEach(r => {
        if (!storeStats[r.store] || r.price < storeStats[r.store]) storeStats[r.store] = r.price;
      });

      const card = document.createElement('div');
      card.className = 'prod-card';
      card.style.animationDelay = `${idx * 0.06}s`;

      let entriesHTML = '';
      recs.forEach(r => {
        const isLowest = r.price === lowest.price;
        entriesHTML += `
          <div class="entry-row">
            <div class="entry-dot ${isLowest ? 'lowest' : ''}"></div>
            <div class="entry-store">${r.storeOriginal}</div>
            <div class="entry-price">${currency}${r.price.toFixed(2)}</div>
            <div class="entry-date">${r.date.split('T')[0]}</div>
            <button class="entry-del" data-id="${r._id}" title="Delete">✕</button>
          </div>`;
      });

      card.innerHTML = `
        <div class="prod-header">
          <div class="prod-name">${latest.productOriginal}</div>
          <div class="prod-badges">
            <span class="badge badge-latest">Latest ${currency}${latest.price.toFixed(2)} · ${latest.storeOriginal}</span>
            <span class="badge badge-lowest">Lowest ${currency}${lowest.price.toFixed(2)} · ${lowest.storeOriginal}</span>
            ${trendBadge(recsAsc)}
          </div>
        </div>
        <div class="entries">
          <div class="entries-label">All entries</div>
          ${entriesHTML}
        </div>
        <div class="charts">
          <canvas id="line-${prod}"></canvas>
          <canvas id="bar-${prod}"></canvas>
        </div>`;

      dash.appendChild(card);

      card.querySelectorAll('.entry-del').forEach(btn => {
        btn.addEventListener('click', () => deleteEntry(btn.dataset.id));
      });

      requestAnimationFrame(() => {
        const lineEl = document.getElementById(`line-${prod}`);
        const barEl  = document.getElementById(`bar-${prod}`);
        if (!lineEl || !barEl || typeof Chart === 'undefined') return;

        const tickColor = 'rgba(240,240,248,0.35)';
        const gridColor = 'rgba(255,255,255,0.05)';

        if (charts[`line-${prod}`]) charts[`line-${prod}`].destroy();
        charts[`line-${prod}`] = new Chart(lineEl.getContext('2d'), {
          type: 'line',
          data: {
            labels: recsAsc.map(r => r.date.split('T')[0]),
            datasets: [{
              label: 'Price', data: recsAsc.map(r => r.price),
              borderColor: '#7c6af7', backgroundColor: 'rgba(124,106,247,0.12)',
              tension: 0.35, pointRadius: 4, pointHoverRadius: 7,
              pointBackgroundColor: '#7c6af7', fill: true
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: true,
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { color: tickColor, font: { size: 10 } }, grid: { color: gridColor } },
              y: { ticks: { color: tickColor, font: { size: 10 }, callback: v => `${currency}${v}` }, grid: { color: gridColor } }
            }
          }
        });

        if (charts[`bar-${prod}`]) charts[`bar-${prod}`].destroy();
        charts[`bar-${prod}`] = new Chart(barEl.getContext('2d'), {
          type: 'bar',
          data: {
            labels: Object.keys(storeStats),
            datasets: [{
              label: 'Lowest Price',
              data: Object.values(storeStats),
              backgroundColor: Object.values(storeStats).map(p => p === lowest.price ? 'rgba(74,222,128,0.75)' : 'rgba(124,106,247,0.55)'),
              borderRadius: 7
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: true,
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { color: tickColor, font: { size: 10 } }, grid: { display: false } },
              y: { ticks: { color: tickColor, font: { size: 10 }, callback: v => `${currency}${v}` }, grid: { color: gridColor } }
            }
          }
        });
      });

      idx++;
    }
  }

  function populateStoreFilter(records, selected = '') {
    const sel = document.getElementById('filterStore');
    const stores = [...new Set(records.map(r => r.store))];
    sel.innerHTML = '<option value="">All stores</option>';
    stores.forEach(s => sel.innerHTML += `<option value="${s}" ${s === selected ? 'selected' : ''}>${s}</option>`);
  }

  async function refresh() {
    const records = await fetchRecords();
    const kw = document.getElementById('search').value.trim().toLowerCase();
    const sf = document.getElementById('filterStore').value;
    populateStoreFilter(records, sf);
    renderDashboard(records.filter(r => (!kw || r.product.includes(kw)) && (!sf || r.store === sf)));
    updatePriceHint();
  }

  // ── Add ──
  const addBtn = document.getElementById('addBtn');
  addBtn.addEventListener('click', async () => {
    const product = document.getElementById('product').value.trim();
    const store   = document.getElementById('store').value.trim();
    const price   = parseFloat(document.getElementById('price').value);
    if (!product || !store || !price || price <= 0) {
      showToast('Please fill all fields correctly.', 'error'); return;
    }
    addBtn.disabled = true; addBtn.textContent = 'Saving…';
    try {
      await addDoc(col(), {
        product: product.toLowerCase(), store: store.toLowerCase(), price,
        date: new Date().toISOString(), productOriginal: product, storeOriginal: store
      });
      document.getElementById('product').value = '';
      document.getElementById('price').value   = '';
      document.getElementById('store').value   = '';
      document.getElementById('priceHint').className = 'price-hint';
      cachedRecords = null;
      await refresh();
      showToast('Record added ✓', 'success');
    } catch(e) {
      console.error(e); showToast('Save failed. Please try again.', 'error');
    } finally {
      addBtn.disabled = false; addBtn.textContent = 'Add Record';
    }
  });

  // ── Delete ──
  async function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    try {
      await deleteDoc(doc(db, `users/${currentUser.uid}/records_${catId}`, id));
      cachedRecords = null; await refresh();
      showToast('Entry deleted', 'error');
    } catch(e) {
      console.error(e); showToast('Delete failed.', 'error');
    }
  }

  // ── Search ──
  let debTimer;
  document.getElementById('search').addEventListener('input', () => {
    clearTimeout(debTimer); debTimer = setTimeout(refresh, 300);
  });
  document.getElementById('filterStore').addEventListener('change', refresh);

  // ── Export ──
  document.getElementById('exportBtn').addEventListener('click', async () => {
    const records = await fetchRecords();
    if (!records.length) { showToast('No data to export.', 'warn'); return; }
    let csv = 'product,store,price,date\n';
    records.forEach(r => csv += `${r.productOriginal},${r.storeOriginal},${r.price},${r.date}\n`);
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(new Blob([csv], { type: 'text/csv' })),
      download: `${catId}-prices.csv`
    });
    a.click(); URL.revokeObjectURL(a.href);
    showToast('CSV exported ✓', 'success');
  });

  // ── Import ──
  document.getElementById('importCSV').addEventListener('change', async e => {
    const file = e.target.files[0]; if (!file) return;
    try {
      const lines = (await file.text()).split('\n').slice(1);
      let count = 0;
      for (const line of lines) {
        if (!line.trim()) continue;
        const parts = line.split(',');
        if (parts.length < 3) continue;
        const [product, store, price, date] = parts;
        const p = parseFloat(price);
        if (!product?.trim() || !store?.trim() || isNaN(p) || p <= 0) continue;
        await addDoc(col(), {
          product: product.trim().toLowerCase(), store: store.trim().toLowerCase(), price: p,
          date: date?.trim() || new Date().toISOString(),
          productOriginal: product.trim(), storeOriginal: store.trim()
        });
        count++;
      }
      cachedRecords = null; await refresh();
      showToast(`Imported ${count} record(s) ✓`, 'success');
    } catch(err) {
      console.error(err); showToast('Import failed. Check CSV format.', 'error');
    }
    e.target.value = '';
  });

  // ── Auth gate: redirect to login if not signed in ──
  onAuthStateChanged(auth, async user => {
    document.getElementById('loadingGate').style.display = 'none';
    if (user) {
      currentUser = user;
      document.getElementById('trackerApp').style.display = 'block';
      await refresh();
    } else {
      window.location.href = 'index.html';
    }
  });

  // SW
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/shopping-pwa/sw.js'));
  }
</script>
</body>
</html>
