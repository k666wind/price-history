<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1520">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1520;
      --glass:   rgba(255,255,255,0.045);
      --glass2:  rgba(255,255,255,0.07);
      --border:  rgba(255,255,255,0.09);
      --border2: rgba(255,255,255,0.14);
      --text:    #e8f0fe;
      --muted:   rgba(200,215,245,0.45);
      --accent:  #5b8dee;
      --accent2: #4fd1c5;
      --success: #68d391;
      --danger:  #fc8181;
      --warn:    #f6ad55;
      --cat-grad: linear-gradient(135deg, #3b6be0, #2563eb);
    }

    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

    /* Ambient orbs */
    .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.14; }
    .orb-1 { width: 500px; height: 500px; background: #3b6be0; top: -150px; left: -100px; animation: drift1 18s ease-in-out infinite alternate; }
    .orb-2 { width: 350px; height: 350px; background: #1eb5a3; bottom: 10vh; right: -80px; animation: drift2 22s ease-in-out infinite alternate; }
    @keyframes drift1 { from{transform:translate(0,0)} to{transform:translate(40px,60px)} }
    @keyframes drift2 { from{transform:translate(0,0)} to{transform:translate(-40px,30px)} }

    .shell { position: relative; z-index: 1; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(16px);
      background: rgba(16,26,44,0.92); backdrop-filter: blur(20px);
      border: 1px solid var(--border2); border-radius: 40px;
      padding: 12px 24px; font-size: 0.86rem; font-weight: 500; color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      opacity: 0; transition: opacity 0.3s, transform 0.3s;
      pointer-events: none; z-index: 9999; white-space: nowrap;
    }
    .toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(104,211,145,0.5); color: var(--success); }
    .toast.error   { border-color: rgba(252,129,129,0.5); color: var(--danger); }
    .toast.warn    { border-color: rgba(246,173,85,0.5);  color: var(--warn); }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; gap: 14px;
      padding: 22px 18px 0; max-width: 580px; margin: 0 auto;
      animation: slideDown 0.5s ease both;
    }
    @keyframes slideDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }

    .back-btn {
      width: 42px; height: 42px; border-radius: 13px;
      background: var(--glass2); backdrop-filter: blur(12px);
      border: 1px solid var(--border2); color: var(--text);
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .back-btn:hover { border-color: var(--accent); background: rgba(91,141,238,0.12); }

    .topbar-info { flex: 1; }

    .topbar-title {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 800;
      letter-spacing: -0.02em;
    }

    .topbar-strip {
      width: 28px; height: 6px; border-radius: 3px;
      background: var(--cat-grad); flex-shrink: 0;
    }

    .topbar-currency {
      font-size: 0.7rem; color: var(--muted); margin-top: 3px; padding-left: 2px;
    }

    /* ── Main ── */
    .main { padding: 22px 18px 60px; max-width: 580px; margin: 0 auto; }

    /* ── Form card ── */
    .form-card {
      background: var(--glass); backdrop-filter: blur(20px);
      border: 1px solid var(--border2); border-radius: 24px;
      padding: 22px 20px; margin-bottom: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.07);
      animation: slideUp 0.5s ease 0.1s both;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .form-title {
      font-family: 'Syne', sans-serif; font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .field-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .field-label { font-size: 0.7rem; color: var(--muted); font-weight: 500; padding-left: 4px; }

    .field-input {
      width: 100%; height: 48px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 13px; padding: 0 16px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      outline: none; transition: border-color 0.18s, background 0.18s;
    }
    .field-input::placeholder { color: rgba(200,215,245,0.25); }
    .field-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.09); }

    /* Price hint */
    .price-hint {
      display: none; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.04); border-radius: 11px;
      padding: 10px 14px; margin-bottom: 10px;
      font-size: 0.82rem; color: var(--muted); border: 1px solid var(--border);
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .price-hint.visible { display: flex; }
    .price-hint.cheaper { border-color: rgba(104,211,145,0.35); color: var(--success); }
    .price-hint.dearer  { border-color: rgba(252,129,129,0.35); color: var(--danger); }
    .price-hint.same    { border-color: rgba(91,141,238,0.35);  color: var(--accent); }

    .btn-add {
      width: 100%; height: 52px; border-radius: 15px;
      background: var(--cat-grad);
      border: none; color: #fff;
      font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.04em;
      box-shadow: 0 8px 24px rgba(59,107,224,0.35);
      transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
    }
    .btn-add:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 12px 32px rgba(59,107,224,0.45); }
    .btn-add:active:not(:disabled) { transform: scale(0.98); }
    .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Search ── */
    .search-row {
      display: flex; gap: 10px; margin-bottom: 18px;
      animation: slideUp 0.5s ease 0.18s both;
    }

    .search-wrap { position: relative; flex: 1; }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 1rem; pointer-events: none;
    }
    .search-input {
      width: 100%; height: 46px;
      background: var(--glass2); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 0 16px 0 42px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      outline: none; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: rgba(200,215,245,0.25); }

    .store-filter {
      height: 46px; background: var(--glass2); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 0 14px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.86rem;
      outline: none; cursor: pointer; min-width: 110px;
    }
    .store-filter option { background: #111d2e; }

    /* ── Dashboard ── */
    #dashboard { display: flex; flex-direction: column; gap: 16px; }

    .prod-card {
      background: var(--glass); backdrop-filter: blur(20px);
      border: 1px solid var(--border2); border-radius: 24px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.07);
      animation: cardIn 0.45s cubic-bezier(0.34,1.2,0.64,1) both;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(18px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }

    /* Coloured top strip */
    .prod-strip { height: 3px; background: var(--cat-grad); }

    .prod-header { padding: 16px 18px 14px; border-bottom: 1px solid var(--border); }

    .prod-name {
      font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 800;
      letter-spacing: -0.02em;
    }

    .prod-badges { display: flex; gap: 7px; margin-top: 10px; flex-wrap: wrap; }

    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.01em;
    }
    .badge-latest { background: rgba(91,141,238,0.15); color: #93b4f5; border: 1px solid rgba(91,141,238,0.2); }
    .badge-lowest { background: rgba(104,211,145,0.12); color: var(--success); border: 1px solid rgba(104,211,145,0.2); }
    .badge-up     { background: rgba(252,129,129,0.12); color: var(--danger); border: 1px solid rgba(252,129,129,0.2); }
    .badge-down   { background: rgba(104,211,145,0.12); color: var(--success); border: 1px solid rgba(104,211,145,0.2); }
    .badge-stable { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }

    /* Entries */
    .entries { padding: 0 18px 10px; }

    .entries-label {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--muted); padding: 14px 0 10px;
    }

    .entry-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 12px; transition: background 0.12s;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .entry-row:last-child { border-bottom: none; }
    .entry-row:hover { background: rgba(255,255,255,0.035); }

    /* Colour bar instead of dot */
    .entry-bar {
      width: 3px; height: 28px; border-radius: 2px; flex-shrink: 0;
      background: var(--muted); opacity: 0.4;
    }
    .entry-bar.lowest {
      background: var(--success); opacity: 1;
      box-shadow: 0 0 8px rgba(104,211,145,0.5);
    }

    .entry-store { font-size: 0.86rem; font-weight: 500; flex: 1; }

    /* Big prominent price */
    .entry-price {
      font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 800;
      letter-spacing: -0.02em; color: var(--text);
    }
    .entry-price.lowest-price { color: var(--success); }

    .entry-date { font-size: 0.68rem; color: var(--muted); min-width: 70px; text-align: right; }

    .entry-del {
      background: none; border: none; color: var(--danger); cursor: pointer;
      font-size: 0.78rem; padding: 5px 9px; border-radius: 9px;
      opacity: 0.25; transition: opacity 0.15s, background 0.15s; flex-shrink: 0;
    }
    .entry-del:hover { opacity: 1; background: rgba(252,129,129,0.1); }

    /* Charts */
    .charts { padding: 4px 18px 20px; display: flex; flex-direction: column; gap: 16px; }

    /* CSV row */
    .csv-row {
      display: flex; gap: 10px; margin-top: 24px;
      animation: slideUp 0.5s ease 0.5s both;
    }

    .btn-csv {
      flex: 1; height: 48px; border-radius: 14px;
      background: var(--glass2); backdrop-filter: blur(12px);
      border: 1px solid var(--border2); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.86rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: border-color 0.15s, background 0.15s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .btn-csv:hover { border-color: rgba(91,141,238,0.45); background: rgba(91,141,238,0.08); }
    #importCSV { display: none; }

    /* Empty */
    .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
    .empty-icon { font-size: 2.6rem; margin-bottom: 14px; }
    .empty-text { font-size: 0.88rem; line-height: 1.6; }

    .spinner {
      display: flex; align-items: center; justify-content: center;
      padding: 60px; color: var(--muted); font-size: 0.88rem; gap: 10px;
    }
    .spin {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<div class="shell">
  <div class="toast" id="toast"></div>

  <div id="loadingGate" class="spinner" style="min-height:100vh;position:fixed;inset:0;z-index:10;background:var(--bg)">
    <div class="spin"></div> Loading…
  </div>

  <div id="trackerApp" style="display:none">
    <div class="topbar">
      <a href="index.html" class="back-btn">‹</a>
      <div class="topbar-info">
        <div class="topbar-title">
          <div class="topbar-strip" id="catStrip"></div>
          <span id="catEmoji"></span>
          <span id="catName"></span>
        </div>
        <div class="topbar-currency" id="currencyLabel"></div>
      </div>
    </div>

    <div class="main">
      <!-- Form -->
      <div class="form-card">
        <div class="form-title">Add Price Record</div>
        <div class="field-group">
          <div class="field-label">Product</div>
          <input class="field-input" id="product" placeholder="e.g. Whole Milk 2L" autocomplete="off">
        </div>
        <div class="two-col">
          <div class="field-group">
            <div class="field-label">Price (<span class="cur-sym"></span>)</div>
            <input class="field-input" id="price" type="number" placeholder="0.00" min="0.01" step="0.01">
          </div>
          <div class="field-group">
            <div class="field-label">Store</div>
            <input class="field-input" id="store" placeholder="e.g. Tesco" autocomplete="off">
          </div>
        </div>
        <div class="price-hint" id="priceHint"></div>
        <button class="btn-add" id="addBtn">Add Record</button>
      </div>

      <!-- Search -->
      <div class="search-row">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input class="search-input" id="search" placeholder="Search products…">
        </div>
        <select class="store-filter" id="filterStore">
          <option value="">All stores</option>
        </select>
      </div>

      <!-- Dashboard -->
      <div id="dashboard"></div>

      <!-- CSV -->
      <div class="csv-row">
        <button class="btn-csv">
          <label for="importCSV" style="cursor:pointer;display:flex;align-items:center;gap:7px">
            ⬆ Import CSV <input type="file" id="importCSV" accept=".csv">
          </label>
        </button>
        <button class="btn-csv" id="exportBtn">⬇ Export CSV</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { auth, db } from './firebase.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import {
    collection, addDoc, getDocs, deleteDoc, doc, query, orderBy
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const params   = new URLSearchParams(location.search);
  const catId    = params.get('id')       || 'general';
  const catName  = params.get('name')     || 'Tracker';
  const catEmoji = params.get('emoji')    || '🏷️';
  const catGrad  = params.get('grad')     || 'linear-gradient(135deg,#3b6be0,#2563eb)';
  const currency = params.get('currency') || localStorage.getItem('ph_currency') || '£';

  document.getElementById('catName').textContent    = catName;
  document.getElementById('catEmoji').textContent   = catEmoji;
  document.getElementById('currencyLabel').textContent = `Currency: ${currency}`;
  document.getElementById('catStrip').style.background = catGrad;
  document.querySelector('.btn-add').style.background  = catGrad;
  document.title = `${catName} · Price History`;
  document.querySelectorAll('.cur-sym').forEach(el => el.textContent = currency);
  document.documentElement.style.setProperty('--cat-grad', catGrad);

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.className = 'toast', 2800);
  }

  let currentUser = null;
  let cachedRecords = null;
  let charts = {};

  function col() { return collection(db, `users/${currentUser.uid}/records_${catId}`); }

  async function fetchRecords(force = false) {
    if (!force && cachedRecords) return cachedRecords;
    const snap = await getDocs(query(col(), orderBy('date','asc')));
    cachedRecords = [];
    snap.forEach(d => cachedRecords.push({ _id: d.id, ...d.data() }));
    return cachedRecords;
  }

  function trendBadge(recs) {
    if (recs.length < 2) return '';
    const latest = recs[recs.length-1].price;
    const prev   = recs[recs.length-2].price;
    const pct    = (Math.abs((latest-prev)/prev)*100).toFixed(1);
    if (latest < prev) return `<span class="badge badge-down">📉 ${pct}% cheaper</span>`;
    if (latest > prev) return `<span class="badge badge-up">📈 ${pct}% dearer</span>`;
    return `<span class="badge badge-stable">➡ Stable</span>`;
  }

  function updatePriceHint() {
    const productKey = document.getElementById('product').value.trim().toLowerCase();
    const priceVal   = parseFloat(document.getElementById('price').value);
    const hint       = document.getElementById('priceHint');
    if (!productKey || !cachedRecords || isNaN(priceVal)) { hint.className = 'price-hint'; return; }
    const recs = cachedRecords.filter(r => r.product === productKey);
    if (!recs.length) { hint.className = 'price-hint'; return; }
    const last = [...recs].sort((a,b) => new Date(b.date)-new Date(a.date))[0];
    const diff = priceVal - last.price;
    const pct  = (Math.abs(diff)/last.price*100).toFixed(1);
    if (diff < 0) { hint.className='price-hint visible cheaper'; hint.textContent=`✓ ${pct}% cheaper than last time (${currency}${last.price.toFixed(2)})`; }
    else if (diff > 0) { hint.className='price-hint visible dearer'; hint.textContent=`↑ ${pct}% more expensive than last time (${currency}${last.price.toFixed(2)})`; }
    else { hint.className='price-hint visible same'; hint.textContent=`= Same price as last time`; }
  }

  document.getElementById('product').addEventListener('input', updatePriceHint);
  document.getElementById('price').addEventListener('input', updatePriceHint);

  function renderDashboard(records) {
    const dash = document.getElementById('dashboard');
    dash.innerHTML = '';
    if (!records.length) {
      dash.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No records yet.<br>Add your first price above!</div></div>`;
      return;
    }

    const productMap = {};
    records.forEach(r => { if (!productMap[r.product]) productMap[r.product]=[]; productMap[r.product].push(r); });

    let idx = 0;
    for (let prod in productMap) {
      const recs   = productMap[prod].sort((a,b)=>new Date(b.date)-new Date(a.date));
      const recsAsc = [...recs].reverse();
      const latest = recs[0];
      const lowest = recs.reduce((m,r)=>r.price<m.price?r:m,recs[0]);

      const storeStats = {};
      recs.forEach(r => { if (!storeStats[r.store]||r.price<storeStats[r.store]) storeStats[r.store]=r.price; });

      const card = document.createElement('div');
      card.className = 'prod-card';
      card.style.animationDelay = `${idx*0.08}s`;

      let entriesHTML = '';
      recs.forEach(r => {
        const isLowest = r.price === lowest.price;
        entriesHTML += `
          <div class="entry-row">
            <div class="entry-bar ${isLowest?'lowest':''}"></div>
            <div class="entry-store">${r.storeOriginal}</div>
            <div class="entry-price ${isLowest?'lowest-price':''}">${currency}${r.price.toFixed(2)}</div>
            <div class="entry-date">${r.date.split('T')[0]}</div>
            <button class="entry-del" data-id="${r._id}">✕</button>
          </div>`;
      });

      card.innerHTML = `
        <div class="prod-strip"></div>
        <div class="prod-header">
          <div class="prod-name">${latest.productOriginal}</div>
          <div class="prod-badges">
            <span class="badge badge-latest">Latest ${currency}${latest.price.toFixed(2)} · ${latest.storeOriginal}</span>
            <span class="badge badge-lowest">Lowest ${currency}${lowest.price.toFixed(2)} · ${lowest.storeOriginal}</span>
            ${trendBadge(recsAsc)}
          </div>
        </div>
        <div class="entries">
          <div class="entries-label">Price History</div>
          ${entriesHTML}
        </div>
        <div class="charts">
          <canvas id="line-${prod}"></canvas>
          <canvas id="bar-${prod}"></canvas>
        </div>`;

      dash.appendChild(card);

      card.querySelectorAll('.entry-del').forEach(btn => btn.addEventListener('click', ()=>deleteEntry(btn.dataset.id)));

      requestAnimationFrame(() => {
        const lineEl = document.getElementById(`line-${prod}`);
        const barEl  = document.getElementById(`bar-${prod}`);
        if (!lineEl||!barEl||typeof Chart==='undefined') return;

        const tick = 'rgba(200,215,245,0.3)';
        const grid = 'rgba(255,255,255,0.04)';

        if (charts[`line-${prod}`]) charts[`line-${prod}`].destroy();
        charts[`line-${prod}`] = new Chart(lineEl.getContext('2d'), {
          type: 'line',
          data: {
            labels: recsAsc.map(r=>r.date.split('T')[0]),
            datasets: [{ label:'Price', data: recsAsc.map(r=>r.price),
              borderColor:'#5b8dee', backgroundColor:'rgba(91,141,238,0.1)',
              tension:0.4, pointRadius:4, pointHoverRadius:7,
              pointBackgroundColor:'#5b8dee', fill:true }]
          },
          options: { responsive:true, maintainAspectRatio:true,
            plugins:{ legend:{display:false} },
            scales:{
              x:{ ticks:{color:tick,font:{size:10}}, grid:{color:grid} },
              y:{ ticks:{color:tick,font:{size:10},callback:v=>`${currency}${v}`}, grid:{color:grid} }
            }
          }
        });

        if (charts[`bar-${prod}`]) charts[`bar-${prod}`].destroy();
        charts[`bar-${prod}`] = new Chart(barEl.getContext('2d'), {
          type: 'bar',
          data: {
            labels: Object.keys(storeStats),
            datasets: [{ label:'Lowest Price', data: Object.values(storeStats),
              backgroundColor: Object.values(storeStats).map(p=>p===lowest.price?'rgba(104,211,145,0.7)':'rgba(91,141,238,0.5)'),
              borderRadius:8 }]
          },
          options: { responsive:true, maintainAspectRatio:true,
            plugins:{ legend:{display:false} },
            scales:{
              x:{ ticks:{color:tick,font:{size:10}}, grid:{display:false} },
              y:{ ticks:{color:tick,font:{size:10},callback:v=>`${currency}${v}`}, grid:{color:grid} }
            }
          }
        });
      });

      idx++;
    }
  }

  function populateStoreFilter(records, selected='') {
    const sel = document.getElementById('filterStore');
    sel.innerHTML = '<option value="">All stores</option>';
    [...new Set(records.map(r=>r.store))].forEach(s => sel.innerHTML += `<option value="${s}" ${s===selected?'selected':''}>${s}</option>`);
  }

  async function refresh() {
    const records = await fetchRecords();
    const kw = document.getElementById('search').value.trim().toLowerCase();
    const sf = document.getElementById('filterStore').value;
    populateStoreFilter(records, sf);
    renderDashboard(records.filter(r=>(!kw||r.product.includes(kw))&&(!sf||r.store===sf)));
    updatePriceHint();
  }

  const addBtn = document.getElementById('addBtn');
  addBtn.addEventListener('click', async () => {
    const product = document.getElementById('product').value.trim();
    const store   = document.getElementById('store').value.trim();
    const price   = parseFloat(document.getElementById('price').value);
    if (!product||!store||!price||price<=0) { showToast('Please fill all fields correctly.','error'); return; }
    addBtn.disabled=true; addBtn.textContent='Saving…';
    try {
      await addDoc(col(), { product:product.toLowerCase(), store:store.toLowerCase(), price,
        date:new Date().toISOString(), productOriginal:product, storeOriginal:store });
      document.getElementById('product').value='';
      document.getElementById('price').value='';
      document.getElementById('store').value='';
      document.getElementById('priceHint').className='price-hint';
      cachedRecords=null; await refresh();
      showToast('Record added ✓','success');
    } catch(e) { console.error(e); showToast('Save failed. Please try again.','error'); }
    finally { addBtn.disabled=false; addBtn.textContent='Add Record'; }
  });

  async function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    try {
      await deleteDoc(doc(db, `users/${currentUser.uid}/records_${catId}`, id));
      cachedRecords=null; await refresh(); showToast('Entry deleted','error');
    } catch(e) { console.error(e); showToast('Delete failed.','error'); }
  }

  let debTimer;
  document.getElementById('search').addEventListener('input', ()=>{ clearTimeout(debTimer); debTimer=setTimeout(refresh,300); });
  document.getElementById('filterStore').addEventListener('change', refresh);

  document.getElementById('exportBtn').addEventListener('click', async () => {
    const records = await fetchRecords();
    if (!records.length) { showToast('No data to export.','warn'); return; }
    let csv='product,store,price,date\n';
    records.forEach(r=>csv+=`${r.productOriginal},${r.storeOriginal},${r.price},${r.date}\n`);
    const a=Object.assign(document.createElement('a'),{
      href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),
      download:`${catId}-prices.csv`
    });
    a.click(); URL.revokeObjectURL(a.href);
    showToast('CSV exported ✓','success');
  });

  document.getElementById('importCSV').addEventListener('change', async e=>{
    const file=e.target.files[0]; if(!file) return;
    try {
      const lines=(await file.text()).split('\n').slice(1);
      let count=0;
      for(const line of lines){
        if(!line.trim()) continue;
        const parts=line.split(','); if(parts.length<3) continue;
        const [product,store,price,date]=parts;
        const p=parseFloat(price);
        if(!product?.trim()||!store?.trim()||isNaN(p)||p<=0) continue;
        await addDoc(col(),{product:product.trim().toLowerCase(),store:store.trim().toLowerCase(),price:p,
          date:date?.trim()||new Date().toISOString(),productOriginal:product.trim(),storeOriginal:store.trim()});
        count++;
      }
      cachedRecords=null; await refresh();
      showToast(`Imported ${count} record(s) ✓`,'success');
    } catch(err){ console.error(err); showToast('Import failed. Check CSV format.','error'); }
    e.target.value='';
  });

  onAuthStateChanged(auth, async user=>{
    document.getElementById('loadingGate').style.display='none';
    if(user){ currentUser=user; document.getElementById('trackerApp').style.display='block'; await refresh(); }
    else { window.location.href='index.html'; }
  });

  if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('/shopping-pwa/sw.js'));
</script>
</body>
</html>
