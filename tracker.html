<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#fdf6ee">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #fdf6ee;
      --surface: #ffffff;
      --border:  #f0e6d8;
      --border2: #e8d8c8;
      --text:    #3d2c1e;
      --text2:   #6b5040;
      --muted:   #a8937e;
      --accent:  #f4845f;
      --success: #34d399;
      --danger:  #f87171;
      --warn:    #fbbf24;
      --cat-color: #f4845f;
    }

    html, body { min-height:100%; background:var(--bg); color:var(--text); font-family:'Quicksand',sans-serif; overflow-x:hidden; }

    /* Background blobs */
    .bg-blobs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .blob { position:absolute; border-radius:50%; filter:blur(70px); opacity:0.2; }
    .blob-1 { width:450px; height:450px; background:#ffd6c0; top:-140px; right:-100px; animation:bd1 20s ease-in-out infinite alternate; }
    .blob-2 { width:350px; height:350px; background:#c7d2fe; bottom:-80px; left:-60px; animation:bd2 25s ease-in-out infinite alternate; }
    @keyframes bd1{from{transform:translate(0,0)}to{transform:translate(-25px,35px)}}
    @keyframes bd2{from{transform:translate(0,0)}to{transform:translate(30px,-25px)}}

    .shell { position:relative; z-index:1; }

    /* ── Toast ── */
    .toast {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(16px);
      background:var(--surface); border:2px solid var(--border2); border-radius:40px;
      padding:12px 24px; font-size:0.88rem; font-weight:700; color:var(--text2);
      box-shadow:0 8px 32px rgba(61,44,30,0.12);
      opacity:0; transition:opacity 0.3s, transform 0.3s;
      pointer-events:none; z-index:9999; white-space:nowrap; font-family:'Nunito',sans-serif;
    }
    .toast.show    { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.success { border-color:#6ee7b7; color:#059669; }
    .toast.error   { border-color:#fca5a5; color:#dc2626; }
    .toast.warn    { border-color:#fcd34d; color:#d97706; }

    /* ── Topbar ── */
    .topbar {
      display:flex; align-items:center; gap:14px;
      padding:20px 18px 0; max-width:580px; margin:0 auto;
      animation:slideDown 0.45s cubic-bezier(0.34,1.3,0.64,1) both;
    }
    @keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}

    .topbar-logo {
      width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(244,132,95,0.25);
    }

    .back-btn {
      width:44px; height:44px; border-radius:14px;
      background:var(--surface); border:2px solid var(--border2);
      color:var(--text2); font-size:1.3rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      text-decoration:none; flex-shrink:0;
      box-shadow:0 2px 8px rgba(61,44,30,0.08);
      transition:border-color 0.15s, transform 0.15s;
    }
    .back-btn:hover { border-color:var(--cat-color); transform:scale(1.05); }

    .topbar-info { flex:1; }
    .topbar-title {
      display:flex; align-items:center; gap:10px;
      font-family:'Nunito',sans-serif; font-size:1.3rem; font-weight:900; letter-spacing:-0.02em;
    }
    .topbar-badge {
      padding:3px 10px; border-radius:20px; font-size:0.72rem; font-weight:800;
      font-family:'Nunito',sans-serif; background:rgba(244,132,95,0.12); color:var(--cat-color);
    }
    .topbar-currency { font-size:0.7rem; color:var(--muted); margin-top:3px; font-weight:600; }

    /* ── Main ── */
    .main { padding:20px 18px 60px; max-width:580px; margin:0 auto; }

    /* ── Form card ── */
    .form-card {
      background:var(--surface); border:2px solid var(--border);
      border-radius:26px; padding:22px 20px; margin-bottom:18px;
      box-shadow:0 6px 24px rgba(61,44,30,0.07);
      animation:slideUp 0.5s cubic-bezier(0.34,1.2,0.64,1) 0.1s both;
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

    .form-title {
      font-family:'Nunito',sans-serif; font-size:0.72rem; font-weight:800;
      letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:16px;
    }

    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    .field-group { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
    .field-label { font-size:0.72rem; color:var(--text2); font-weight:700; padding-left:4px; font-family:'Nunito',sans-serif; }

    .field-input {
      width:100%; height:48px; background:var(--bg); border:2px solid var(--border);
      border-radius:14px; padding:0 16px; color:var(--text);
      font-family:'Quicksand',sans-serif; font-size:0.95rem; font-weight:600;
      outline:none; transition:border-color 0.18s, box-shadow 0.18s;
    }
    .field-input::placeholder { color:#c8b8a8; font-weight:500; }
    .field-input:focus { border-color:var(--cat-color); box-shadow:0 0 0 4px rgba(244,132,95,0.1); }

    /* Price hint */
    .price-hint {
      display:none; align-items:center; gap:8px;
      background:var(--bg); border:2px solid var(--border);
      border-radius:12px; padding:10px 14px; margin-bottom:10px;
      font-size:0.83rem; color:var(--muted); font-weight:600;
      animation:fadeIn 0.2s ease;
    }
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .price-hint.visible { display:flex; }
    .price-hint.cheaper { border-color:#6ee7b7; color:#059669; background:#f0fdf4; }
    .price-hint.dearer  { border-color:#fca5a5; color:#dc2626; background:#fff1f2; }
    .price-hint.same    { border-color:#c7d2fe; color:#4f46e5; background:#eef2ff; }

    .btn-add {
      width:100%; height:52px; border-radius:16px;
      background:linear-gradient(135deg,var(--cat-color),var(--cat-color));
      border:none; color:#fff;
      font-family:'Nunito',sans-serif; font-size:1rem; font-weight:800;
      cursor:pointer; letter-spacing:0.02em;
      box-shadow:0 6px 20px rgba(244,132,95,0.38);
      transition:transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn-add:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 10px 28px rgba(244,132,95,0.45); }
    .btn-add:active:not(:disabled) { transform:scale(0.98); }
    .btn-add:disabled { opacity:0.45; cursor:not-allowed; }

    /* ── Search ── */
    .search-row {
      display:flex; gap:10px; margin-bottom:18px;
      animation:slideUp 0.5s ease 0.18s both;
    }

    .search-wrap { position:relative; flex:1; }
    .search-icon {
      position:absolute; left:14px; top:50%; transform:translateY(-50%);
      color:var(--muted); font-size:1rem; pointer-events:none;
    }
    .search-input {
      width:100%; height:48px; background:var(--surface); border:2px solid var(--border);
      border-radius:16px; padding:0 16px 0 42px; color:var(--text);
      font-family:'Quicksand',sans-serif; font-size:0.9rem; font-weight:600;
      outline:none; box-shadow:0 2px 8px rgba(61,44,30,0.05);
      transition:border-color 0.15s, box-shadow 0.15s;
    }
    .search-input:focus { border-color:var(--cat-color); box-shadow:0 0 0 4px rgba(244,132,95,0.1); }
    .search-input::placeholder { color:#c8b8a8; font-weight:500; }

    .store-filter {
      height:48px; background:var(--surface); border:2px solid var(--border);
      border-radius:16px; padding:0 14px; color:var(--text);
      font-family:'Quicksand',sans-serif; font-size:0.86rem; font-weight:600;
      outline:none; cursor:pointer; min-width:110px;
      box-shadow:0 2px 8px rgba(61,44,30,0.05);
    }
    .store-filter option { background:var(--surface); }

    /* ── Dashboard ── */
    #dashboard { display:flex; flex-direction:column; gap:16px; }

    .prod-card {
      background:var(--surface); border:2px solid var(--border);
      border-radius:26px; overflow:hidden;
      box-shadow:0 6px 24px rgba(61,44,30,0.07);
      animation:cardBounce 0.5s cubic-bezier(0.34,1.3,0.64,1) both;
    }
    @keyframes cardBounce{from{opacity:0;transform:translateY(20px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}

    .prod-strip { height:4px; }

    .prod-header { padding:16px 18px 14px; border-bottom:2px dashed var(--border); }

    .prod-name {
      font-family:'Nunito',sans-serif; font-size:1.1rem; font-weight:900; letter-spacing:-0.02em;
    }

    .prod-badges { display:flex; gap:7px; margin-top:10px; flex-wrap:wrap; }

    .badge {
      display:inline-flex; align-items:center; gap:5px;
      padding:5px 12px; border-radius:20px; font-size:0.72rem; font-weight:700;
      font-family:'Nunito',sans-serif; border:2px solid transparent;
    }
    .badge-latest  { background:#eff6ff; color:#3b82f6; border-color:#dbeafe; }
    .badge-lowest  { background:#f0fdf4; color:#059669; border-color:#bbf7d0; }
    .badge-up      { background:#fff1f2; color:#dc2626; border-color:#fecaca; }
    .badge-down    { background:#f0fdf4; color:#059669; border-color:#bbf7d0; }
    .badge-stable  { background:#fafaf9; color:var(--muted); border-color:var(--border2); }

    /* Entries */
    .entries { padding:0 18px 12px; }
    .entries-label {
      font-size:0.64rem; font-weight:800; letter-spacing:0.16em;
      text-transform:uppercase; color:var(--muted); padding:14px 0 10px;
      font-family:'Nunito',sans-serif;
    }

    .entry-row {
      display:flex; align-items:center; gap:10px;
      padding:10px 12px; border-radius:14px;
      transition:background 0.12s; border-bottom:2px dashed #faf0e8;
    }
    .entry-row:last-child { border-bottom:none; }
    .entry-row:hover { background:#fdf6ee; }

    .entry-bar { width:4px; height:30px; border-radius:3px; flex-shrink:0; background:var(--border2); }
    .entry-bar.lowest { background:var(--success); box-shadow:0 0 8px rgba(52,211,153,0.4); }

    .entry-store { font-size:0.88rem; font-weight:700; flex:1; }

    /* Big price */
    .entry-price {
      font-family:'Nunito',sans-serif; font-size:1.1rem; font-weight:900;
      letter-spacing:-0.02em; color:var(--text);
    }
    .entry-price.lowest-price { color:#059669; }

    .entry-date { font-size:0.68rem; color:var(--muted); min-width:72px; text-align:right; font-weight:600; }

    .entry-del {
      background:none; border:none; color:var(--danger); cursor:pointer;
      font-size:0.82rem; padding:5px 9px; border-radius:10px;
      opacity:0.3; transition:opacity 0.15s, background 0.15s; flex-shrink:0;
    }
    .entry-del:hover { opacity:1; background:rgba(248,113,113,0.1); }

    /* Charts */
    .charts { padding:4px 18px 20px; display:flex; flex-direction:column; gap:16px; }

    /* CSV row */
    .csv-row {
      display:flex; gap:10px; margin-top:24px;
      animation:slideUp 0.5s ease 0.5s both;
    }
    .btn-csv {
      flex:1; height:50px; border-radius:16px;
      background:var(--surface); border:2px solid var(--border2);
      color:var(--text2); font-family:'Nunito',sans-serif; font-size:0.88rem; font-weight:700;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px;
      box-shadow:0 2px 8px rgba(61,44,30,0.06);
      transition:border-color 0.15s, transform 0.15s;
    }
    .btn-csv:hover { border-color:var(--cat-color); transform:translateY(-1px); }
    #importCSV { display:none; }

    /* Empty */
    .empty { text-align:center; padding:48px 24px; color:var(--muted); }
    .empty-icon { font-size:3rem; margin-bottom:14px; }
    .empty-text { font-size:0.9rem; font-weight:600; line-height:1.7; }

    .spinner {
      display:flex; align-items:center; justify-content:center;
      padding:60px; color:var(--muted); font-size:0.9rem; gap:10px; font-weight:600;
      min-height:100vh; position:fixed; inset:0; background:var(--bg); z-index:10;
    }
    .spin {
      width:22px; height:22px; border:3px solid var(--border2);
      border-top-color:var(--accent); border-radius:50%;
      animation:spin 0.7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

<div class="shell">
  <div class="toast" id="toast"></div>
  <div id="loadingGate" class="spinner"><div class="spin"></div> Loading…</div>

  <div id="trackerApp" style="display:none">
    <div class="topbar">
      <a href="index.html" class="back-btn">‹</a>
      <div class="topbar-info">
        <div class="topbar-title">
          <span id="catEmoji"></span>
          <span id="catName"></span>
          <span class="topbar-badge" id="topbarBadge"></span>
        </div>
        <div class="topbar-currency" id="currencyLabel"></div>
      </div>
    </div>

    <div class="main">
      <div class="form-card">
        <div class="form-title">✏️ Add Price Record</div>
        <div class="field-group">
          <div class="field-label">Product</div>
          <input class="field-input" id="product" placeholder="e.g. Whole Milk 2L" autocomplete="off">
        </div>
        <div class="two-col">
          <div class="field-group">
            <div class="field-label">Price (<span class="cur-sym"></span>)</div>
            <input class="field-input" id="price" type="number" placeholder="0.00" min="0.01" step="0.01">
          </div>
          <div class="field-group">
            <div class="field-label">Store</div>
            <input class="field-input" id="store" placeholder="e.g. Tesco" autocomplete="off">
          </div>
        </div>
        <div class="price-hint" id="priceHint"></div>
        <button class="btn-add" id="addBtn">Add Record ✓</button>
      </div>

      <div class="search-row">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input class="search-input" id="search" placeholder="Search products…">
        </div>
        <select class="store-filter" id="filterStore">
          <option value="">All stores</option>
        </select>
      </div>

      <div id="dashboard"></div>

      <div class="csv-row">
        <button class="btn-csv">
          <label for="importCSV" style="cursor:pointer;display:flex;align-items:center;gap:7px">
            ⬆ Import CSV <input type="file" id="importCSV" accept=".csv">
          </label>
        </button>
        <button class="btn-csv" id="exportBtn">⬇ Export CSV</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { auth, db } from './firebase.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import {
    collection, addDoc, getDocs, deleteDoc, doc, query, orderBy
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const params   = new URLSearchParams(location.search);
  const catId    = params.get('id')       || 'general';
  const catName  = params.get('name')     || 'Tracker';
  const catEmoji = params.get('emoji')    || '🏷️';
  const catColor = params.get('color')    || '#f4845f';
  const currency = params.get('currency') || localStorage.getItem('ph_currency') || '£';

  document.getElementById('catName').textContent    = catName;
  document.getElementById('catEmoji').textContent   = catEmoji;
  document.getElementById('currencyLabel').textContent = `Currency: ${currency}`;
  document.getElementById('topbarBadge').textContent = catName;
  document.getElementById('topbarBadge').style.background = catColor + '18';
  document.getElementById('topbarBadge').style.color = catColor;
  document.title = `${catName} · Price History`;
  document.querySelectorAll('.cur-sym').forEach(el => el.textContent = currency);
  document.documentElement.style.setProperty('--cat-color', catColor);

  function showToast(msg, type='') {
    const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast ${type} show`;
    setTimeout(()=>t.className='toast',2800);
  }

  let currentUser=null, cachedRecords=null, charts={};

  function col() { return collection(db,`users/${currentUser.uid}/records_${catId}`); }

  async function fetchRecords(force=false) {
    if(!force&&cachedRecords) return cachedRecords;
    const snap=await getDocs(query(col(),orderBy('date','asc')));
    cachedRecords=[]; snap.forEach(d=>cachedRecords.push({_id:d.id,...d.data()}));
    return cachedRecords;
  }

  function trendBadge(recs) {
    if(recs.length<2) return '';
    const latest=recs[recs.length-1].price, prev=recs[recs.length-2].price;
    const pct=(Math.abs((latest-prev)/prev)*100).toFixed(1);
    if(latest<prev) return `<span class="badge badge-down">📉 ${pct}% cheaper</span>`;
    if(latest>prev) return `<span class="badge badge-up">📈 ${pct}% dearer</span>`;
    return `<span class="badge badge-stable">➡ Stable</span>`;
  }

  function updatePriceHint() {
    const productKey=document.getElementById('product').value.trim().toLowerCase();
    const priceVal=parseFloat(document.getElementById('price').value);
    const hint=document.getElementById('priceHint');
    if(!productKey||!cachedRecords||isNaN(priceVal)){hint.className='price-hint';return;}
    const recs=cachedRecords.filter(r=>r.product===productKey);
    if(!recs.length){hint.className='price-hint';return;}
    const last=[...recs].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    const diff=priceVal-last.price, pct=(Math.abs(diff)/last.price*100).toFixed(1);
    if(diff<0){hint.className='price-hint visible cheaper';hint.textContent=`🎉 ${pct}% cheaper than last time (${currency}${last.price.toFixed(2)})`;}
    else if(diff>0){hint.className='price-hint visible dearer';hint.textContent=`⚠️ ${pct}% more expensive than last time (${currency}${last.price.toFixed(2)})`;}
    else{hint.className='price-hint visible same';hint.textContent=`✓ Same price as last time`;}
  }

  document.getElementById('product').addEventListener('input', updatePriceHint);
  document.getElementById('price').addEventListener('input', updatePriceHint);

  function renderDashboard(records) {
    const dash=document.getElementById('dashboard'); dash.innerHTML='';
    if(!records.length){
      dash.innerHTML=`<div class="empty"><div class="empty-icon">🌸</div><div class="empty-text">No records yet.<br>Add your first price above!</div></div>`;
      return;
    }

    const productMap={};
    records.forEach(r=>{if(!productMap[r.product])productMap[r.product]=[];productMap[r.product].push(r);});

    let idx=0;
    for(let prod in productMap){
      const recs=productMap[prod].sort((a,b)=>new Date(b.date)-new Date(a.date));
      const recsAsc=[...recs].reverse();
      const latest=recs[0];
      const lowest=recs.reduce((m,r)=>r.price<m.price?r:m,recs[0]);
      const storeStats={};
      recs.forEach(r=>{if(!storeStats[r.store]||r.price<storeStats[r.store])storeStats[r.store]=r.price;});

      const card=document.createElement('div'); card.className='prod-card';
      card.style.animationDelay=`${idx*0.08}s`;

      let entriesHTML='';
      recs.forEach(r=>{
        const isLowest=r.price===lowest.price;
        entriesHTML+=`
          <div class="entry-row">
            <div class="entry-bar ${isLowest?'lowest':''}"></div>
            <div class="entry-store">${r.storeOriginal}</div>
            <div class="entry-price ${isLowest?'lowest-price':''}">${currency}${r.price.toFixed(2)}</div>
            <div class="entry-date">${r.date.split('T')[0]}</div>
            <button class="entry-del" data-id="${r._id}">✕</button>
          </div>`;
      });

      card.innerHTML=`
        <div class="prod-strip" style="background:linear-gradient(90deg,${catColor},${catColor}88)"></div>
        <div class="prod-header">
          <div class="prod-name">${latest.productOriginal}</div>
          <div class="prod-badges">
            <span class="badge badge-latest">Latest ${currency}${latest.price.toFixed(2)} · ${latest.storeOriginal}</span>
            <span class="badge badge-lowest">🏆 Lowest ${currency}${lowest.price.toFixed(2)} · ${lowest.storeOriginal}</span>
            ${trendBadge(recsAsc)}
          </div>
        </div>
        <div class="entries">
          <div class="entries-label">Price History</div>
          ${entriesHTML}
        </div>
        <div class="charts">
          <canvas id="line-${prod}"></canvas>
          <canvas id="bar-${prod}"></canvas>
        </div>`;

      dash.appendChild(card);
      card.querySelectorAll('.entry-del').forEach(btn=>btn.addEventListener('click',()=>deleteEntry(btn.dataset.id)));

      requestAnimationFrame(()=>{
        const lineEl=document.getElementById(`line-${prod}`);
        const barEl=document.getElementById(`bar-${prod}`);
        if(!lineEl||!barEl||typeof Chart==='undefined') return;

        const tick='#a8937e'; const grid='rgba(240,230,216,0.6)';

        if(charts[`line-${prod}`]) charts[`line-${prod}`].destroy();
        charts[`line-${prod}`]=new Chart(lineEl.getContext('2d'),{
          type:'line',
          data:{
            labels:recsAsc.map(r=>r.date.split('T')[0]),
            datasets:[{label:'Price',data:recsAsc.map(r=>r.price),
              borderColor:catColor, backgroundColor:catColor+'22',
              tension:0.4, pointRadius:5, pointHoverRadius:8,
              pointBackgroundColor:catColor, fill:true,
              borderWidth:2.5}]
          },
          options:{responsive:true,maintainAspectRatio:true,
            plugins:{legend:{display:false}},
            scales:{
              x:{ticks:{color:tick,font:{size:10,family:'Quicksand',weight:'600'}},grid:{color:grid}},
              y:{ticks:{color:tick,font:{size:10,family:'Quicksand',weight:'600'},callback:v=>`${currency}${v}`},grid:{color:grid}}
            }
          }
        });

        if(charts[`bar-${prod}`]) charts[`bar-${prod}`].destroy();
        charts[`bar-${prod}`]=new Chart(barEl.getContext('2d'),{
          type:'bar',
          data:{
            labels:Object.keys(storeStats),
            datasets:[{label:'Lowest Price',data:Object.values(storeStats),
              backgroundColor:Object.values(storeStats).map(p=>p===lowest.price?'rgba(52,211,153,0.7)':catColor+'88'),
              borderRadius:10, borderSkipped:false}]
          },
          options:{responsive:true,maintainAspectRatio:true,
            plugins:{legend:{display:false}},
            scales:{
              x:{ticks:{color:tick,font:{size:10,family:'Quicksand',weight:'600'}},grid:{display:false}},
              y:{ticks:{color:tick,font:{size:10,family:'Quicksand',weight:'600'},callback:v=>`${currency}${v}`},grid:{color:grid}}
            }
          }
        });
      });
      idx++;
    }
  }

  function populateStoreFilter(records, selected='') {
    const sel=document.getElementById('filterStore');
    sel.innerHTML='<option value="">All stores</option>';
    [...new Set(records.map(r=>r.store))].forEach(s=>sel.innerHTML+=`<option value="${s}" ${s===selected?'selected':''}>${s}</option>`);
  }

  async function refresh() {
    const records=await fetchRecords();
    const kw=document.getElementById('search').value.trim().toLowerCase();
    const sf=document.getElementById('filterStore').value;
    populateStoreFilter(records,sf);
    renderDashboard(records.filter(r=>(!kw||r.product.includes(kw))&&(!sf||r.store===sf)));
    updatePriceHint();
  }

  const addBtn=document.getElementById('addBtn');
  addBtn.addEventListener('click',async()=>{
    const product=document.getElementById('product').value.trim();
    const store=document.getElementById('store').value.trim();
    const price=parseFloat(document.getElementById('price').value);
    if(!product||!store||!price||price<=0){showToast('Please fill all fields correctly 🙏','error');return;}
    addBtn.disabled=true; addBtn.textContent='Saving… 🌸';
    try {
      await addDoc(col(),{product:product.toLowerCase(),store:store.toLowerCase(),price,
        date:new Date().toISOString(),productOriginal:product,storeOriginal:store});
      document.getElementById('product').value='';
      document.getElementById('price').value='';
      document.getElementById('store').value='';
      document.getElementById('priceHint').className='price-hint';
      cachedRecords=null; await refresh();
      showToast('Record added ✓','success');
    } catch(e){console.error(e);showToast('Save failed. Please try again.','error');}
    finally{addBtn.disabled=false;addBtn.textContent='Add Record ✓';}
  });

  async function deleteEntry(id) {
    if(!confirm('Delete this entry?')) return;
    try{
      await deleteDoc(doc(db,`users/${currentUser.uid}/records_${catId}`,id));
      cachedRecords=null; await refresh(); showToast('Entry deleted 🗑️');
    }catch(e){console.error(e);showToast('Delete failed.','error');}
  }

  let debTimer;
  document.getElementById('search').addEventListener('input',()=>{clearTimeout(debTimer);debTimer=setTimeout(refresh,300);});
  document.getElementById('filterStore').addEventListener('change',refresh);

  document.getElementById('exportBtn').addEventListener('click',async()=>{
    const records=await fetchRecords();
    if(!records.length){showToast('No data to export 🙈','warn');return;}
    let csv='product,store,price,date\n';
    records.forEach(r=>csv+=`${r.productOriginal},${r.storeOriginal},${r.price},${r.date}\n`);
    const a=Object.assign(document.createElement('a'),{
      href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),
      download:`${catId}-prices.csv`
    });
    a.click(); URL.revokeObjectURL(a.href);
    showToast('CSV exported ✓','success');
  });

  document.getElementById('importCSV').addEventListener('change',async e=>{
    const file=e.target.files[0]; if(!file) return;
    try{
      const lines=(await file.text()).split('\n').slice(1); let count=0;
      for(const line of lines){
        if(!line.trim()) continue;
        const parts=line.split(','); if(parts.length<3) continue;
        const [product,store,price,date]=parts; const p=parseFloat(price);
        if(!product?.trim()||!store?.trim()||isNaN(p)||p<=0) continue;
        await addDoc(col(),{product:product.trim().toLowerCase(),store:store.trim().toLowerCase(),price:p,
          date:date?.trim()||new Date().toISOString(),productOriginal:product.trim(),storeOriginal:store.trim()});
        count++;
      }
      cachedRecords=null; await refresh(); showToast(`Imported ${count} record(s) ✓`,'success');
    }catch(err){console.error(err);showToast('Import failed. Check CSV format.','error');}
    e.target.value='';
  });

  onAuthStateChanged(auth,async user=>{
    document.getElementById('loadingGate').style.display='none';
    if(user){currentUser=user;document.getElementById('trackerApp').style.display='block';await refresh();}
    else{window.location.href='index.html';}
  });

  if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('/shopping-pwa/sw.js'));
</script>
</body>
</html>
