<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping PWA</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js" defer></script>
</head>
<body>
  <ion-app>
    <ion-header>
      <ion-toolbar>
        <ion-title>Shopping List</ion-title>
      </ion-toolbar>
      <ion-searchbar placeholder="Search Product" [(ngModel)]="searchText"></ion-searchbar>
    </ion-header>
    <ion-content>
      <ion-list>
        <ion-item lines="none" class="apple-input">
          <ion-input label="Product" labelPlacement="floating" [(ngModel)]="product"></ion-input>
        </ion-item>
        <ion-item lines="none" class="apple-input">
          <ion-input label="Price" type="number" labelPlacement="floating" [(ngModel)]="price"></ion-input>
        </ion-item>
        <ion-item lines="none" class="apple-input">
          <ion-input label="Store" labelPlacement="floating" [(ngModel)]="store"></ion-input>
        </ion-item>
        <ion-button expand="full" (click)="addEntry()">Add Entry</ion-button>

        <ion-item-sliding *ngFor="let record of filteredRecords()">
          <ion-item>
            <ion-label>
              {{record.product}} - ${{record.price}} @ {{record.store}}
            </ion-label>
          </ion-item>
          <ion-item-options side="end">
            <ion-item-option color="danger" (click)="removeEntry(record)">Delete</ion-item-option>
          </ion-item-options>
        </ion-item-sliding>
      </ion-list>

      <canvas id="priceChart"></canvas>
    </ion-content>
  </ion-app>
</body>
</html>
