<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" rel="stylesheet">
<script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poetsen+One&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>
<ion-app>

<!-- Header -->
<ion-header>
  <ion-toolbar>
    <ion-title class="title-font">Price History</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

<!-- Dark Mode -->
<ion-button expand="block" onclick="toggleDarkMode()">Toggle Dark Mode</ion-button>

<!-- Add Button (open modal) -->
<ion-button expand="block" onclick="openModal()">+ Add Product</ion-button>

<!-- Search -->
<ion-card>
  <ion-card-header>
    <ion-card-title class="card-title">Search Product</ion-card-title>
  </ion-card-header>

  <ion-card-content>
    <ion-searchbar id="search"></ion-searchbar>
  </ion-card-content>
</ion-card>

<!-- Dashboard -->
<div id="dashboard">

  <!-- Skeleton -->
  <div class="skeleton-card"></div>
  <div class="skeleton-card"></div>

</div>

</ion-content>

<!-- Modal -->
<ion-modal id="addModal">
  <ion-content class="ion-padding">

    <h2 class="title-font">Add Product</h2>

    <ion-item>
      <ion-input id="product" placeholder="Product"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input id="price" type="number" placeholder="Price"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input id="store" placeholder="Store"></ion-input>
    </ion-item>

    <ion-button expand="block" onclick="saveProduct()">Save</ion-button>
    <ion-button expand="block" fill="clear" onclick="closeModal()">Cancel</ion-button>

  </ion-content>
</ion-modal>

<script>
window.toggleDarkMode = () => {
  document.body.classList.toggle('dark');
}

window.openModal = () => {
  document.getElementById('addModal').present();
}

window.closeModal = () => {
  document.getElementById('addModal').dismiss();
}

/* Toast */
window.showToast = async (msg) => {
  const toast = document.createElement('ion-toast');
  toast.message = msg;
  toast.duration = 1500;
  document.body.appendChild(toast);
  await toast.present();
}

/* Fake save */
window.saveProduct = () => {
  showToast("Added!");
  closeModal();
}
</script>

</ion-app>
</body>
</html>
