<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Tracker</title>

<!-- Ionic -->
<link href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" rel="stylesheet">
<script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poetsen+One&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<ion-app>

  <!-- Header -->
  <ion-header>
    <ion-toolbar color="primary">
      <ion-title>
        <img src="icon.png" style="height:28px; vertical-align:middle; margin-right:8px;">
        Price History
      </ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">

    <!-- Dark Mode -->
    <ion-button expand="block" onclick="toggleDarkMode()">
      Toggle Dark / Light Mode
    </ion-button>

    <!-- Add Product -->
    <ion-card>
      <ion-card-header>
        <ion-card-title>Add Product</ion-card-title>
      </ion-card-header>

      <ion-card-content>

        <ion-item>
          <ion-icon name="cube-outline" slot="start"></ion-icon>
          <ion-input id="product" placeholder="Product"></ion-input>
        </ion-item>

        <ion-item>
          <ion-icon name="cash-outline" slot="start"></ion-icon>
          <ion-input id="price" type="number" placeholder="Price"></ion-input>
        </ion-item>

        <ion-item>
          <ion-icon name="storefront-outline" slot="start"></ion-icon>
          <ion-input id="store" placeholder="Store"></ion-input>
        </ion-item>

        <ion-button expand="full" color="success" onclick="addRecord()">Add</ion-button>

      </ion-card-content>
    </ion-card>

    <!-- Search -->
    <ion-card>
      <ion-card-header>
        <ion-card-title>Search Product</ion-card-title>
      </ion-card-header>

      <ion-card-content>

        <ion-searchbar id="search"></ion-searchbar>

        <ion-item>
          <ion-label>Filter by store</ion-label>
          <ion-select id="filterStore">
            <ion-select-option value="">All Stores</ion-select-option>
          </ion-select>
        </ion-item>

      </ion-card-content>
    </ion-card>

    <!-- Dashboard -->
    <div id="dashboard"></div>

    <!-- Import / Export -->
    <ion-card>
      <ion-card-header>
        <ion-card-title>Import / Export CSV</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <input type="file" id="importCSV" accept=".csv">
        <ion-button expand="full" color="tertiary" onclick="exportCSV()">Export CSV</ion-button>
      </ion-card-content>
    </ion-card>

  </ion-content>

</ion-app>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

document.getElementById("search").addEventListener('ionInput', () => window.searchProduct());
document.getElementById("filterStore").addEventListener('ionChange', () => window.searchProduct());

window.toggleDarkMode = () => {
  document.body.classList.toggle('dark');
}
</script>

</body>
</html>
