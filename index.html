<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Tracker</title>

<!-- Ionic CSS & JS -->
<link href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" rel="stylesheet">
<script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<ion-app>
  <ion-header>
    <ion-toolbar color="primary">
<header>
  <img src="icons/price-history-banner.png" alt="Price History" />
  <h1>Price History</h1>
</header>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">

    <!-- Dark Mode Toggle -->
    <ion-button expand="block" onclick="toggleDarkMode()">Toggle Dark / Light Mode</ion-button>

    <!-- Add Product -->
    <ion-card>
      <ion-card-header>
        <ion-card-title>Add Product</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-item>
          <ion-label position="floating">Product</ion-label>
          <ion-input id="product"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="floating">Price</ion-label>
          <ion-input id="price" type="number"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="floating">Store</ion-label>
          <ion-input id="store"></ion-input>
        </ion-item>
        <ion-button expand="full" color="success" onclick="addRecord()">Add</ion-button>
      </ion-card-content>
    </ion-card>

    <!-- Search -->
    <ion-card>
      <ion-card-header>
        <ion-card-title>Search Product</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-searchbar id="search"></ion-searchbar>
        <ion-item>
          <ion-label>Filter by store</ion-label>
          <ion-select id="filterStore">
            <ion-select-option value="">All Stores</ion-select-option>
          </ion-select>
        </ion-item>
      </ion-card-content>
    </ion-card>

    <!-- Dashboard -->
    <div id="dashboard"></div>

    <!-- Import / Export -->
    <ion-card>
      <ion-card-header>
        <ion-card-title>Import / Export CSV</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <input type="file" id="importCSV" accept=".csv">
        <ion-button expand="full" color="tertiary" onclick="exportCSV()">Export CSV</ion-button>
      </ion-card-content>
    </ion-card>

  </ion-content>
</ion-app>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
document.getElementById("search").addEventListener('ionInput', () => window.searchProduct());
document.getElementById("filterStore").addEventListener('ionChange', () => window.searchProduct());

window.toggleDarkMode = () => {
  document.body.classList.toggle('dark');
}
</script>

</body>
</html>
