<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Materialize CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <title>Shopping Tracker</title>
</head>
<body class="container">

<h4>🛒 Shopping Tracker</h4>

<div class="card">
  <div class="card-content">
    <input id="product" placeholder="Product">
    <input id="price" type="number" placeholder="Price">
    <input id="store" placeholder="Store">
    <button class="btn green" onclick="addRecord()">Add</button>
  </div>
</div>

<div class="card">
  <div class="card-content">
    <input id="search" placeholder="Search..." oninput="searchProduct()">
    <div id="result"></div>
  </div>
</div>

<canvas id="chart"></canvas>

<div id="dashboard" class="card"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
